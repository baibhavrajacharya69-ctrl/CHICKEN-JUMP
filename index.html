<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Jump</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#87CEEB, #E0F7FA);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 500px;
            max-width: 100%;
        }

        canvas {
            border: 10px solid #333;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            background: #87CEEB;
            display: block;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .title {
            position: absolute;
            top: -120px;
            left: 52%;
            transform: translateX(-50%);
            font-size: 60px;
            color: #3aeb3a;
            text-shadow: 4px 4px 0 #8f4646,
                        -2px -2px 0 #e4ff49;
            z-index: 25;
            letter-spacing: 5px;
            pointer-events: auto;
        }

        .score {
            position: absolute;
            top: 18px;
            right: 25px;
            font-size: 18px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 25;
            pointer-events: auto;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 30;
        }

        h1 {
            font-size: 36px;
            margin: 10px;
            color: #f16101;
            text-shadow: 4px 4px 0 #d7e2d7;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 35px;
            font-size: 18px;
            margin: 15px;
            background: #FF4500;
            color: white;
            border: 5px solid #fff;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }

        button:hover {
            background: #f3d6c3;
            transform: scale(1.1);
        }

        .controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            z-index: 20;
        }

        .arrow {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.3);
            border: 5px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="game" width="480" height="720"></canvas>
        
        <div class="ui">
      
            <div class="title" id="gameTitle">CHICKENJUMP</div>
            
            
            <div class="score" id="score">Score: 0</div>
            
            <div class="start-screen" id="startScreen">
                <h1>CHICKEN JUMP</h1>
                <button id="startBtn">START GAME</button>
            </div>
    
            <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                <h1>GAME OVER</h1>
                <p id="finalScore" style="font-size: 22px; margin: 15px;">Score: 0</p>
                <button id="restartBtn">PLAY AGAIN</button>
            </div>
        </div>

        <div class="controls" id="mobileControls">
            <div class="arrow" id="leftBtn">←</div>
            <div class="arrow" id="rightBtn">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const WIDTH = 480;
        const HEIGHT = 720;
        
        let chicken = {
            x: WIDTH / 2 - 25,
            y: HEIGHT * 0.6,
            width: 50,
            height: 50,
            vx: 0,
            vy: 0
        };
        
        let gravity = 0.55;
        let friction = 0.82;
        let platforms = [];
        let score = 0;
        let highScore = localStorage.getItem('chickenJumpHigh') || 0;
        let gameRunning = false;
        let keys = {};
        let particles = [];
        let frame = 0;

        class Platform {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 80;
                this.height = 18;
                this.type = Math.random() > 0.82 ? 'moving' : 'normal';
                this.vx = this.type === 'moving' ? (Math.random() > 0.5 ? 2.5 : -2.5) : 0;
            }
        }

        function createInitialPlatforms() {
            platforms = [];
            for (let i = 0; i < 14; i++) {
                platforms.push(new Platform(
                    Math.random() * (WIDTH - 100) + 30,
                    HEIGHT - i * 55 - Math.random() * 30
                ));
            }
        }

        function createParticle(x, y) {
            particles.push({
                x, y,
                vx: Math.random() * 8 - 4,
                vy: Math.random() * 5 - 7,
                life: 28,
                color: '#FFD700'
            });
        }

        function update() {
            if (!gameRunning) return;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) chicken.vx = -7;
            else if (keys['ArrowRight'] || keys['d'] || keys['D']) chicken.vx = 7;
            else chicken.vx *= friction;

            chicken.x += chicken.vx;

            if (chicken.x < -chicken.width) chicken.x = WIDTH;
            if (chicken.x > WIDTH) chicken.x = -chicken.width;

            chicken.vy += gravity;
            chicken.y += chicken.vy;

            for (let p of platforms) {
                if (p.type === 'moving') {
                    p.x += p.vx;
                    if (p.x <= 0 || p.x + p.width >= WIDTH) p.vx *= -1;
                }

                if (chicken.vy > 0 &&
                    chicken.x < p.x + p.width &&
                    chicken.x + chicken.width > p.x &&
                    chicken.y + chicken.height > p.y &&
                    chicken.y + chicken.height - chicken.vy <= p.y) {
                    
                    chicken.y = p.y - chicken.height;
                    chicken.vy = -15.5;
                    
                    for (let i = 0; i < 10; i++) createParticle(chicken.x + 25, chicken.y + 45);
                    score += 12;
                    break;
                }
            }

            if (chicken.y < HEIGHT / 3 && chicken.vy < 0) {
                let scroll = -chicken.vy * 0.9;
                chicken.y = HEIGHT / 3;
                for (let p of platforms) p.y += scroll;
                score += Math.floor(scroll / 2);
            }

            while (platforms.length < 16) {
                const lastY = Math.min(...platforms.map(p => p.y));
                platforms.push(new Platform(
                    Math.random() * (WIDTH - 100) + 30,
                    lastY - 50 - Math.random() * 30
                ));
            }

            platforms = platforms.filter(p => p.y < HEIGHT + 60);
            particles = particles.filter(p => { 
                p.x += p.vx; 
                p.y += p.vy; 
                p.vy += 0.35; 
                p.life--; 
                return p.life > 0; 
            });

            if (chicken.y > HEIGHT + 80) gameOver();
        }

        function drawChicken() {
            frame++;
            const flap = Math.sin(frame * 0.2) * 4;

            ctx.save();
            ctx.translate(chicken.x + 25, chicken.y + 25);

            ctx.fillStyle = '#FFCC00';
            ctx.beginPath();
            ctx.ellipse(0, 5, 22, 18, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFAA00';
            ctx.beginPath();
            ctx.arc(12, -12, 14, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF6600';
            ctx.beginPath();
            ctx.moveTo(24, -12);
            ctx.lineTo(32, -10);
            ctx.lineTo(24, -8);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(16, -15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(17, -15, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF3333';
            ctx.beginPath();
            ctx.moveTo(8, -24);
            ctx.lineTo(15, -32);
            ctx.lineTo(20, -24);
            ctx.fill();

            ctx.fillStyle = '#FFBB00';
            ctx.beginPath();
            ctx.ellipse(-8, 5 + flap, 18, 10, -0.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#FF8800';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(-10, 18);
            ctx.lineTo(-12, 30);
            ctx.moveTo(5, 18);
            ctx.lineTo(8, 30);
            ctx.stroke();

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = '#228B22';
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillRect(p.x + 8, p.y + 4, p.width - 20, 5);
                ctx.fillStyle = '#228B22';
            }

            drawChicken();

            for (let p of particles) {
                ctx.globalAlpha = p.life / 28;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 7, 7);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            chicken.y = HEIGHT * 0.6;
            chicken.vy = -16;
            score = 0;
            createInitialPlatforms();
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('chickenJumpHigh', highScore);
            }
            document.getElementById('finalScore').textContent = `Score: ${Math.floor(score)}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
        leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
        rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
        rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

        createInitialPlatforms();
        gameLoop();
        document.getElementById('startScreen').style.display = 'flex';
    </script>
</body>
</html>
